name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: bin test suite + probes (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run suite
        run: bash bin/run-tests.sh -q

  scrub-gate:
    name: scrub gate (no personal/infra strings)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Grep gate
        run: bash .github/scrub-gate.sh

  secret-scan:
    name: gitleaks (no committed secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
